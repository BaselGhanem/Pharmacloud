<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نقطة البيع (POS) - PharmaCloud</title>
    <style>
        /* --- متغيرات التصميم والـ Dark Mode --- */
        :root {
            --bg-color: #f4f7f6;
            --surface-color: rgba(255, 255, 255, 0.7);
            --border-color: rgba(0, 0, 0, 0.1);
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --accent-color: #007aff;
            --danger-color: #ff3b30;
            --glass-blur: blur(20px);
            --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #1c1c1e;
                --surface-color: rgba(44, 44, 46, 0.6);
                --border-color: rgba(255, 255, 255, 0.1);
                --text-primary: #f5f5f7;
                --text-secondary: #a1a1a6;
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        
        body { background-color: var(--bg-color); color: var(--text-primary); height: 100vh; display: flex; overflow: hidden; }

        /* --- الشريط الجانبي (Sidebar) --- */
        .sidebar { width: 80px; background: var(--surface-color); backdrop-filter: var(--glass-blur); border-left: 1px solid var(--border-color); display: flex; flex-direction: column; align-items: center; padding: 20px 0; z-index: 10; justify-content: space-between;}
        .nav-group { display: flex; flex-direction: column; width: 100%; align-items: center;}
        .nav-item { width: 50px; height: 50px; border-radius: 14px; margin-bottom: 15px; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.2s; background: transparent; border: none; font-size: 22px; color: var(--text-primary); }
        .nav-item:hover, .nav-item.active { background: var(--accent-color); color: white; }
        .logout-btn { color: var(--danger-color); }

        /* --- الحاوية الرئيسية (Main Container) --- */
        .pos-container { flex: 1; display: flex; padding: 20px; gap: 20px; }
        
        /* --- قسم سلة المشتريات والبحث (Cart & Search) --- */
        .cart-section { flex: 2; background: var(--surface-color); backdrop-filter: var(--glass-blur); border: 1px solid var(--border-color); border-radius: 24px; display: flex; flex-direction: column; padding: 20px; box-shadow: var(--shadow); }
        
        .header-info { display: flex; justify-content: space-between; margin-bottom: 20px; align-items: center; }
        .cashier-badge { background: var(--accent-color); color: white; padding: 5px 12px; border-radius: 20px; font-size: 13px; font-weight: bold; }

        .search-bar { position: relative; margin-bottom: 20px; }
        .search-bar input { width: 100%; padding: 18px 20px; border-radius: 16px; border: 1px solid var(--border-color); background: rgba(150,150,150,0.1); color: var(--text-primary); font-size: 16px; outline: none; transition: 0.3s; }
        .search-bar input:focus { border-color: var(--accent-color); box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.1); }
        
        .cart-items { flex: 1; overflow-y: auto; padding-left: 10px; }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 16px; border-bottom: 1px solid var(--border-color); animation: slideIn 0.2s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }
        
        .item-details h4 { margin-bottom: 4px; font-size: 16px; }
        .item-details small { color: var(--text-secondary); font-size: 12px; }
        .item-controls { display: flex; align-items: center; gap: 15px; }
        .item-qty { width: 60px; padding: 8px; border-radius: 8px; border: 1px solid var(--border-color); background: transparent; color: var(--text-primary); text-align: center; font-size: 16px; }
        .item-price { font-weight: 700; width: 90px; text-align: left; }
        .btn-remove { background: rgba(255, 59, 48, 0.1); color: var(--danger-color); border: none; width: 32px; height: 32px; border-radius: 8px; cursor: pointer; font-size: 14px; transition: 0.2s; }
        .btn-remove:hover { background: var(--danger-color); color: white; }

        /* --- قسم الملخص والدفع (Summary) --- */
        .summary-section { flex: 1; background: var(--accent-color); border-radius: 24px; padding: 30px; color: white; display: flex; flex-direction: column; justify-content: space-between; box-shadow: 0 20px 40px rgba(0, 122, 255, 0.3); }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 18px; opacity: 0.9; }
        .total-row { font-size: 36px; font-weight: 800; border-top: 1px solid rgba(255,255,255,0.3); padding-top: 20px; margin-top: 10px; opacity: 1; }
        
        .btn-pay { background: white; color: var(--accent-color); width: 100%; padding: 20px; border-radius: 16px; border: none; font-size: 22px; font-weight: 800; cursor: pointer; transition: transform 0.1s; margin-top: 20px; display: flex; justify-content: center; align-items: center; gap: 10px;}
        .btn-pay:active { transform: scale(0.98); }
        .btn-pay:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
        
        .keyboard-hint { text-align: center; font-size: 13px; opacity: 0.8; margin-top: 15px; background: rgba(0,0,0,0.1); padding: 10px; border-radius: 10px;}

        /* Loader */
        .loader { width: 24px; height: 24px; border: 3px solid rgba(0,122,255,0.3); border-radius: 50%; border-top-color: var(--accent-color); animation: spin 1s linear infinite; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="nav-group">
            <button class="nav-item active" title="نقطة البيع">🛒</button>
            <button class="nav-item" title="المخزون (قريباً)">📦</button>
            <button class="nav-item" title="التقارير (قريباً)">📈</button>
        </div>
        <button class="nav-item logout-btn" onclick="logout()" title="تسجيل خروج">🚪</button>
    </nav>

    <main class="pos-container">
        
        <section class="cart-section">
            <div class="header-info">
                <h2>فاتورة مبيعات جديدة</h2>
                <div class="cashier-badge" id="cashierNameDisplay">الكاشير: تحميل...</div>
            </div>

            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="ابحث بالباركود، أو اضغط (F2) للبحث بالاسم..." autofocus autocomplete="off">
            </div>
            
            <div class="cart-items" id="cartItemsContainer">
                </div>
        </section>

        <section class="summary-section">
            <div>
                <h3 style="margin-bottom: 30px; font-size: 24px;">ملخص الحساب</h3>
                <div class="summary-row">
                    <span>عدد الأصناف:</span>
                    <span id="totalItems">0</span>
                </div>
                <div class="summary-row">
                    <span>الضريبة (0%):</span>
                    <span id="taxAmount">0.00 د.أ</span>
                </div>
                <div class="summary-row total-row">
                    <span>الإجمالي:</span>
                    <span id="grandTotal">0.00 د.أ</span>
                </div>
            </div>
            
            <div>
                <button class="btn-pay" id="payBtn" onclick="processPayment()">
                    <span id="btnText">دفع نقدي (Enter)</span>
                    <div id="payLoader" class="loader"></div>
                </button>
                <div class="keyboard-hint">
                    💡 جهاز الباركود يعمل تلقائياً في أي وقت<br>
                    اضغط <b>F2</b> للبحث اليدوي - اضغط <b>Enter</b> للدفع
                </div>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // 1. التحقق من الجلسة (الحماية السحابية)
        const sessionStr = sessionStorage.getItem('pharmacy_session');
        if (!sessionStr) {
            window.location.href = 'login.html'; // طرد المستخدم غير المسجل
        }
        const sessionData = JSON.parse(sessionStr);
        document.getElementById('cashierNameDisplay').textContent = `الكاشير: ${sessionData.name}`;

        // 2. إعدادات Firebase (نفس التي استخدمتها في login)
        const firebaseConfig = {
            apiKey: "AIzaSyDP6FlbjAeUqut_79qW0T3rPSvfsjPdHfA",
            authDomain: "gen-lang-client-0023266031.firebaseapp.com",
            projectId: "gen-lang-client-0023266031",
            storageBucket: "gen-lang-client-0023266031.firebasestorage.app",
            messagingSenderId: "1052398695491",
            appId: "1:1052398695491:web:1c29151c816929cdc510f6"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 3. حالة سلة المشتريات
        let cart = [];

        // 4. دالة البحث عن دواء عبر الباركود في Firestore
        async function fetchProductByBarcode(barcodeText) {
            const productsRef = collection(db, "products");
            const q = query(productsRef, where("barcode", "==", barcodeText));
            
            try {
                const querySnapshot = await getDocs(q);
                if (!querySnapshot.empty) {
                    const doc = querySnapshot.docs[0];
                    return { id: doc.id, ...doc.data() };
                } else {
                    return null; // الدواء غير موجود
                }
            } catch (error) {
                console.error("خطأ في جلب الدواء:", error);
                return null;
            }
        }

        // 5. إضافة عنصر للسلة
        window.addToCart = async function(barcodeText) {
            // التحقق إذا كان موجود مسبقاً في السلة لزيادة الكمية فقط
            const existingItem = cart.find(item => item.barcode === barcodeText);
            if (existingItem) {
                existingItem.qty += 1;
                playBeep();
                renderCart();
                return;
            }

            // إذا لم يكن في السلة، ابحث عنه في قاعدة البيانات
            const searchInput = document.getElementById('searchInput');
            searchInput.placeholder = "جاري البحث...";
            
            const product = await fetchProductByBarcode(barcodeText);
            
            if (product) {
                cart.push({ ...product, qty: 1 });
                playBeep();
            } else {
                alert(`لم يتم العثور على منتج بالباركود: ${barcodeText}`);
            }
            
            searchInput.value = '';
            searchInput.placeholder = "ابحث بالباركود، أو اضغط (F2)...";
            renderCart();
        }

        // 6. تحديث وحذف العناصر
        window.updateQty = function(barcode, newQty) {
            const item = cart.find(item => item.barcode === barcode);
            if (item) {
                item.qty = parseInt(newQty) || 1;
                renderCart();
            }
        }
        window.removeFromCart = function(barcode) {
            cart = cart.filter(item => item.barcode !== barcode);
            renderCart();
        }

        // 7. رسم السلة وتحديث الإجماليات
        function renderCart() {
            const container = document.getElementById('cartItemsContainer');
            container.innerHTML = '';
            let subtotal = 0; let itemsCount = 0;

            cart.forEach(item => {
                const itemTotal = item.price * item.qty;
                subtotal += itemTotal;
                itemsCount += item.qty;

                container.innerHTML += `
                    <div class="item-row">
                        <div class="item-details">
                            <h4>${item.name}</h4>
                            <small>${item.barcode}</small>
                        </div>
                        <div class="item-controls">
                            <input type="number" class="item-qty" min="1" value="${item.qty}" onchange="updateQty('${item.barcode}', this.value)">
                            <div class="item-price">${itemTotal.toFixed(2)} د.أ</div>
                            <button class="btn-remove" onclick="removeFromCart('${item.barcode}')">✖</button>
                        </div>
                    </div>
                `;
            });

            document.getElementById('totalItems').innerText = itemsCount;
            document.getElementById('grandTotal').innerText = subtotal.toFixed(2) + ' د.أ';
        }

        // 8. عملية الدفع (حفظ في Firestore)
        window.processPayment = async function() {
            if(cart.length === 0) return;
            
            const payBtn = document.getElementById('payBtn');
            const btnText = document.getElementById('btnText');
            const payLoader = document.getElementById('payLoader');

            // تشغيل الأنيميشن
            payBtn.disabled = true;
            btnText.style.display = 'none';
            payLoader.style.display = 'block';

            try {
                // تجميع بيانات الفاتورة
                const invoiceData = {
                    branchId: sessionData.branchId,
                    cashierId: sessionData.uid,
                    cashierName: sessionData.name,
                    items: cart.map(item => ({ id: item.id, name: item.name, price: item.price, qty: item.qty })),
                    totalAmount: parseFloat(document.getElementById('grandTotal').innerText),
                    timestamp: serverTimestamp()
                };

                // إرسال لـ Firestore (مجموعة sales)
                await addDoc(collection(db, "sales"), invoiceData);

                // تفريغ السلة بعد نجاح البيع
                cart = [];
                renderCart();
                document.getElementById('searchInput').focus();
                
            } catch (error) {
                alert("حدث خطأ أثناء حفظ الفاتورة: " + error.message);
            } finally {
                // إيقاف الأنيميشن
                payBtn.disabled = false;
                btnText.style.display = 'block';
                payLoader.style.display = 'none';
            }
        }

        // 9. هندسة الباركود واختصارات الكيبورد (Keyboard-First UX)
        let barcodeBuffer = '';
        let barcodeTimer = null;

        document.addEventListener('keydown', function(e) {
            // اختصار F2 للبحث
            if (e.key === 'F2') {
                e.preventDefault();
                document.getElementById('searchInput').focus();
                return;
            }
            // اختصار الدفع
            if (e.key === 'Enter' && cart.length > 0 && document.activeElement.id !== 'searchInput') {
                processPayment();
                return;
            }

            // التقاط الباركود
            if (e.key === 'Enter' && barcodeBuffer.length > 3) {
                addToCart(barcodeBuffer);
                barcodeBuffer = '';
                e.preventDefault();
                return;
            }
            
            // قراءة جهاز الباركود السريعة
            if (e.key.length === 1 && !e.ctrlKey && !e.altKey) {
                barcodeBuffer += e.key;
                clearTimeout(barcodeTimer);
                barcodeTimer = setTimeout(() => { barcodeBuffer = ''; }, 50); // تفريق بين الكتابة اليدوية والمسح
            }
        });

        // 10. معالجة الإدخال اليدوي للباركود في مربع البحث
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && this.value.trim() !== '') {
                addToCart(this.value.trim());
                e.preventDefault();
            }
        });

        // 11. تسجيل الخروج
        window.logout = function() {
            sessionStorage.removeItem('pharmacy_session');
            window.location.href = 'login.html';
        }

        // 12. صوت الباركود
        function playBeep() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                osc.connect(ctx.destination);
                osc.frequency.value = 900;
                osc.start(); osc.stop(ctx.currentTime + 0.1);
            } catch(e) {}
        }
    </script>
</body>
</html>
