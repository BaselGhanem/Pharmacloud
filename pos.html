<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نقطة البيع (POS) - PharmaCloud</title>
    <style>
        /* --- المتغيرات والتصميم --- */
        :root {
            --bg-color: #f4f7f6;
            --surface-color: rgba(255, 255, 255, 0.85);
            --border-color: rgba(0, 0, 0, 0.1);
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --accent-color: #007aff;
            --danger-color: #ff3b30;
            --success-color: #34c759;
            --glass-blur: blur(20px);
            --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #1c1c1e;
                --surface-color: rgba(44, 44, 46, 0.85);
                --border-color: rgba(255, 255, 255, 0.1);
                --text-primary: #f5f5f7;
                --text-secondary: #a1a1a6;
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-primary); height: 100vh; display: flex; overflow: hidden; }

        /* --- القائمة الجانبية --- */
        .sidebar { width: 80px; background: var(--surface-color); backdrop-filter: var(--glass-blur); border-left: 1px solid var(--border-color); display: flex; flex-direction: column; align-items: center; padding: 20px 0; z-index: 10; justify-content: space-between;}
        .nav-group { display: flex; flex-direction: column; width: 100%; align-items: center;}
        .nav-item { width: 50px; height: 50px; border-radius: 14px; margin-bottom: 15px; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.2s; background: transparent; border: none; font-size: 22px; color: var(--text-primary); }
        .nav-item:hover, .nav-item.active { background: var(--accent-color); color: white; }
        .logout-btn { color: var(--danger-color); }

        /* --- الحاوية الرئيسية --- */
        .pos-container { flex: 1; display: flex; padding: 20px; gap: 20px; }
        
        /* --- قسم المشتريات والبحث --- */
        .cart-section { flex: 2; background: var(--surface-color); backdrop-filter: var(--glass-blur); border: 1px solid var(--border-color); border-radius: 24px; display: flex; flex-direction: column; padding: 20px; box-shadow: var(--shadow); position: relative; }
        .header-info { display: flex; justify-content: space-between; margin-bottom: 20px; align-items: center; }
        .cashier-badge { background: var(--accent-color); color: white; padding: 5px 12px; border-radius: 20px; font-size: 13px; font-weight: bold; }

        /* --- محرك البحث الذكي (Smart Search) --- */
        .search-bar { position: relative; margin-bottom: 20px; z-index: 20; }
        .search-bar input { width: 100%; padding: 18px 20px; border-radius: 16px; border: 1px solid var(--border-color); background: rgba(150,150,150,0.1); color: var(--text-primary); font-size: 16px; outline: none; transition: 0.3s; }
        .search-bar input:focus { border-color: var(--accent-color); box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.1); }
        
        .search-results { position: absolute; top: 60px; width: 100%; background: var(--surface-color); backdrop-filter: var(--glass-blur); border: 1px solid var(--border-color); border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); max-height: 250px; overflow-y: auto; display: none; }
        .search-item { padding: 15px 20px; border-bottom: 1px solid var(--border-color); cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .search-item:hover { background: var(--accent-color); color: white; }
        .search-item-name { font-weight: 600; font-size: 15px; }
        .search-item-meta { font-size: 12px; opacity: 0.8; display: flex; gap: 10px; align-items: center; }

        /* --- الفاتورة --- */
        .cart-items { flex: 1; overflow-y: auto; padding-right: 5px; }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 16px; border-bottom: 1px solid var(--border-color); animation: slideIn 0.2s ease; background: rgba(0,0,0,0.02); border-radius: 12px; margin-bottom: 10px; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }
        
        .item-details h4 { margin-bottom: 6px; font-size: 16px; }
        .item-meta { display: flex; gap: 10px; align-items: center; }
        .barcode-badge { background: rgba(150,150,150,0.2); padding: 3px 8px; border-radius: 6px; font-size: 11px; }
        .location-badge { background: rgba(52, 199, 89, 0.2); color: var(--success-color); padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; }

        .item-controls { display: flex; align-items: center; gap: 15px; }
        .item-qty { width: 60px; padding: 8px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-color); color: var(--text-primary); text-align: center; font-size: 16px; }
        .item-price { font-weight: 700; width: 90px; text-align: left; }
        .btn-remove { background: rgba(255, 59, 48, 0.1); color: var(--danger-color); border: none; width: 32px; height: 32px; border-radius: 8px; cursor: pointer; font-size: 14px; transition: 0.2s; }
        .btn-remove:hover { background: var(--danger-color); color: white; }

        /* --- قسم الدفع --- */
        .summary-section { flex: 1; background: var(--accent-color); border-radius: 24px; padding: 30px; color: white; display: flex; flex-direction: column; justify-content: space-between; box-shadow: 0 20px 40px rgba(0, 122, 255, 0.3); }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 18px; opacity: 0.9; }
        .total-row { font-size: 36px; font-weight: 800; border-top: 1px solid rgba(255,255,255,0.3); padding-top: 20px; margin-top: 10px; opacity: 1; }
        .btn-pay { background: white; color: var(--accent-color); width: 100%; padding: 20px; border-radius: 16px; border: none; font-size: 22px; font-weight: 800; cursor: pointer; transition: transform 0.1s; margin-top: 20px; display: flex; justify-content: center; align-items: center; gap: 10px;}
        .btn-pay:active { transform: scale(0.98); }
        .btn-pay:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
        .keyboard-hint { text-align: center; font-size: 13px; opacity: 0.8; margin-top: 15px; background: rgba(0,0,0,0.1); padding: 10px; border-radius: 10px;}
        .loader { width: 24px; height: 24px; border: 3px solid rgba(0,122,255,0.3); border-radius: 50%; border-top-color: var(--accent-color); animation: spin 1s linear infinite; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="nav-group">
            <button class="nav-item active" title="نقطة البيع">🛒</button>
            <button class="nav-item" title="المخزون">📦</button>
        </div>
        <button class="nav-item logout-btn" onclick="logout()" title="تسجيل خروج">🚪</button>
    </nav>

    <main class="pos-container">
        
        <section class="cart-section">
            <div class="header-info">
                <h2>فاتورة مبيعات</h2>
                <div class="cashier-badge" id="cashierNameDisplay">الكاشير: تحميل...</div>
            </div>

            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="ابحث باسم الدواء، الباركود، أو امسح مباشرة (F2)..." autofocus autocomplete="off">
                <div id="searchResults" class="search-results"></div>
            </div>
            
            <div class="cart-items" id="cartItemsContainer"></div>
        </section>

        <section class="summary-section">
            <div>
                <h3 style="margin-bottom: 30px; font-size: 24px;">ملخص الحساب</h3>
                <div class="summary-row"><span>عدد الأصناف:</span><span id="totalItems">0</span></div>
                <div class="summary-row total-row"><span>الإجمالي:</span><span id="grandTotal">0.00 د.أ</span></div>
            </div>
            
            <div>
                <button class="btn-pay" id="payBtn" onclick="processPayment()">
                    <span id="btnText">دفع نقدي (Enter)</span>
                    <div id="payLoader" class="loader"></div>
                </button>
                <div class="keyboard-hint">💡 امسح الباركود في أي وقت<br>اضغط <b>F2</b> للبحث - <b>Enter</b> للدفع</div>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        // 🔴 استيراد مكتبة المصادقة (Auth) الضرورية للسماح لك بالقراءة من قاعدة البيانات
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // 1. التحقق من الجلسة
        const sessionStr = sessionStorage.getItem('pharmacy_session');
        if (!sessionStr) window.location.href = 'login.html';
        const sessionData = JSON.parse(sessionStr);
        document.getElementById('cashierNameDisplay').textContent = `الكاشير: ${sessionData.name}`;

        // 2. إعدادات Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDP6FlbjAeUqut_79qW0T3rPSvfsjPdHfA",
            authDomain: "gen-lang-client-0023266031.firebaseapp.com",
            projectId: "gen-lang-client-0023266031",
            storageBucket: "gen-lang-client-0023266031.firebasestorage.app",
            messagingSenderId: "1052398695491",
            appId: "1:1052398695491:web:1c29151c816929cdc510f6"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app, "ai-studio-2f881b3f-5867-4dfd-b360-c85f26c6ded4");
        const auth = getAuth(app); // 🔴 تفعيل المصادقة

        // 3. حالة التطبيق (الكتالوج المحلي وسلة المشتريات)
        let cart = [];
        let catalog = []; 

        const searchInput = document.getElementById('searchInput');
        const searchResults = document.getElementById('searchResults');

        // 4. تحميل الكتالوج مرة واحدة عند فتح الصفحة 
        async function loadCatalog() {
            try {
                searchInput.placeholder = "جاري تحميل الأدوية من قاعدة البيانات...";
                const querySnapshot = await getDocs(collection(db, "products"));
                querySnapshot.forEach((doc) => {
                    catalog.push({ id: doc.id, ...doc.data() });
                });
                console.log("تم تحميل الكتالوج بنجاح:", catalog.length, "منتج");
                searchInput.placeholder = `تم تحميل ${catalog.length} منتج! ابحث بالاسم، الباركود، أو امسح (F2)...`;
            } catch (error) {
                console.error("خطأ في تحميل الكتالوج:", error);
                searchInput.placeholder = "خطأ في الاتصال بقاعدة البيانات!";
            }
        }

        // 🔴 التحقق من حالة تسجيل الدخول من سيرفرات Firebase قبل تحميل الأدوية
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // المستخدم مسجل دخوله فعلياً في Firebase، قم بتحميل الكتالوج الآن
                loadCatalog(); 
            } else {
                // الجلسة منتهية، إعادته لصفحة الدخول
                window.location.href = 'login.html'; 
            }
        });

        // 5. محرك البحث التفاعلي 
        searchInput.addEventListener('input', function() {
            const val = this.value.trim().toLowerCase();
            searchResults.innerHTML = '';
            
            if (val.length < 1) {
                searchResults.style.display = 'none';
                return;
            }

            // البحث بالاسم أو الباركود
            const matches = catalog.filter(p => 
                (p.barcode && p.barcode.includes(val)) || 
                (p.name && p.name.toLowerCase().includes(val))
            ).slice(0, 8); // عرض أول 8 نتائج فقط

            if (matches.length > 0) {
                matches.forEach(p => {
                    const div = document.createElement('div');
                    div.className = 'search-item';
                    div.innerHTML = `
                        <span class="search-item-name">${p.name}</span>
                        <div class="search-item-meta">
                            <span>السعر: ${p.price} د.أ</span>
                            <span style="color:var(--success-color);font-weight:bold;">${p.location || 'لا يوجد مكان'}</span>
                        </div>
                    `;
                    // عند النقر على النتيجة، أضفها للسلة
                    div.onclick = () => {
                        addToCartDirectly(p);
                        searchInput.value = '';
                        searchResults.style.display = 'none';
                        searchInput.focus();
                    };
                    searchResults.appendChild(div);
                });
                searchResults.style.display = 'block';
            } else {
                searchResults.style.display = 'none';
            }
        });

        // إخفاء القائمة عند النقر خارجها
        document.addEventListener('click', (e) => {
            if (e.target.id !== 'searchInput') searchResults.style.display = 'none';
        });

        // 6. إضافة عنصر للسلة مباشرة (تستخدم للمسح وللنقر على القائمة)
        window.addToCartDirectly = function(product) {
            const existingItem = cart.find(item => item.barcode === product.barcode);
            if (existingItem) {
                existingItem.qty += 1;
            } else {
                cart.push({ ...product, qty: 1 });
            }
            playBeep();
            renderCart();
        }

        // 7. معالجة الإدخال المباشر (مثل قارئ الباركود أو الضغط على Enter)
        function handleExactMatch(text) {
            const product = catalog.find(p => p.barcode === text || p.name === text);
            if (product) {
                addToCartDirectly(product);
                searchInput.value = '';
            } else {
                alert(`لم يتم العثور على منتج يطابق: ${text}`);
            }
        }

        // 8. تحديث وحذف العناصر ورسم السلة 
        window.updateQty = function(barcode, newQty) {
            const item = cart.find(item => item.barcode === barcode);
            if (item) { item.qty = parseInt(newQty) || 1; renderCart(); }
        }
        window.removeFromCart = function(barcode) {
            cart = cart.filter(item => item.barcode !== barcode);
            renderCart();
        }

        function renderCart() {
            const container = document.getElementById('cartItemsContainer');
            container.innerHTML = '';
            let subtotal = 0; let itemsCount = 0;

            cart.forEach(item => {
                const itemTotal = item.price * item.qty;
                subtotal += itemTotal;
                itemsCount += item.qty;
                const loc = item.location || 'غير محدد'; 

                container.innerHTML += `
                    <div class="item-row">
                        <div class="item-details">
                            <h4>${item.name}</h4>
                            <div class="item-meta">
                                <span class="barcode-badge">#${item.barcode}</span>
                                <span class="location-badge">📍 الرف: ${loc}</span>
                            </div>
                        </div>
                        <div class="item-controls">
                            <input type="number" class="item-qty" min="1" value="${item.qty}" onchange="updateQty('${item.barcode}', this.value)">
                            <div class="item-price">${itemTotal.toFixed(2)} د.أ</div>
                            <button class="btn-remove" onclick="removeFromCart('${item.barcode}')">✖</button>
                        </div>
                    </div>
                `;
            });
            document.getElementById('totalItems').innerText = itemsCount;
            document.getElementById('grandTotal').innerText = subtotal.toFixed(2) + ' د.أ';
        }

        // 9. هندسة الباركود واختصارات الكيبورد
        let barcodeBuffer = '';
        let barcodeTimer = null;

        document.addEventListener('keydown', function(e) {
            if (e.key === 'F2') { e.preventDefault(); searchInput.focus(); return; }
            if (e.key === 'Enter' && cart.length > 0 && document.activeElement.id !== 'searchInput') { processPayment(); return; }

            if (e.key === 'Enter' && barcodeBuffer.length > 3) {
                handleExactMatch(barcodeBuffer);
                barcodeBuffer = ''; e.preventDefault(); return;
            }
            if (e.key.length === 1 && !e.ctrlKey && !e.altKey && document.activeElement.id !== 'searchInput') {
                barcodeBuffer += e.key;
                clearTimeout(barcodeTimer);
                barcodeTimer = setTimeout(() => { barcodeBuffer = ''; }, 50); 
            }
        });

        // 10. معالجة الإدخال اليدوي والضغط على Enter
        searchInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && this.value.trim() !== '') {
                handleExactMatch(this.value.trim());
                e.preventDefault();
                searchResults.style.display = 'none';
            }
        });

        // 11. عملية الدفع (حفظ في Firestore)
        window.processPayment = async function() {
            if(cart.length === 0) return;
            const payBtn = document.getElementById('payBtn');
            const btnText = document.getElementById('btnText');
            const payLoader = document.getElementById('payLoader');

            payBtn.disabled = true; btnText.style.display = 'none'; payLoader.style.display = 'block';

            try {
                const invoiceData = {
                    branchId: sessionData.branchId,
                    cashierId: sessionData.uid,
                    cashierName: sessionData.name,
                    items: cart.map(item => ({ id: item.id, name: item.name, price: item.price, qty: item.qty })),
                    totalAmount: parseFloat(document.getElementById('grandTotal').innerText),
                    timestamp: serverTimestamp()
                };
                await addDoc(collection(db, "sales"), invoiceData);
                cart = []; renderCart(); searchInput.focus();
                alert("تم حفظ الفاتورة بنجاح!");
            } catch (error) {
                alert("حدث خطأ: " + error.message);
            } finally {
                payBtn.disabled = false; btnText.style.display = 'block'; payLoader.style.display = 'none';
            }
        }

        // 12. تسجيل الخروج
        window.logout = function() { 
            sessionStorage.removeItem('pharmacy_session'); 
            auth.signOut().then(() => { window.location.href = 'login.html'; });
        }
        
        function playBeep() { try { const ctx = new (window.AudioContext || window.webkitAudioContext)(); const osc = ctx.createOscillator(); osc.connect(ctx.destination); osc.frequency.value = 900; osc.start(); osc.stop(ctx.currentTime + 0.1); } catch(e) {} }
    </script>
</body>
</html>
