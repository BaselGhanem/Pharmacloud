<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نقطة البيع (POS) - PharmaCloud</title>
    <style>
        /* --- المتغيرات والتصميم --- */
        :root {
            --bg-color: #f4f7f6;
            --surface-color: rgba(255, 255, 255, 0.85);
            --border-color: rgba(0, 0, 0, 0.1);
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --accent-color: #007aff;
            --danger-color: #ff3b30;
            --success-color: #34c759;
            --warning-color: #ff9500;
            --glass-blur: blur(20px);
            --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #1c1c1e;
                --surface-color: rgba(44, 44, 46, 0.85);
                --border-color: rgba(255, 255, 255, 0.1);
                --text-primary: #f5f5f7;
                --text-secondary: #a1a1a6;
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-primary); height: 100vh; display: flex; overflow: hidden; }

        /* --- القائمة الجانبية --- */
        .sidebar { width: 80px; background: var(--surface-color); backdrop-filter: var(--glass-blur); border-left: 1px solid var(--border-color); display: flex; flex-direction: column; align-items: center; padding: 20px 0; z-index: 10; justify-content: space-between;}
        .nav-group { display: flex; flex-direction: column; width: 100%; align-items: center;}
        .nav-item { width: 50px; height: 50px; border-radius: 14px; margin-bottom: 15px; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.2s; background: transparent; border: none; font-size: 22px; color: var(--text-primary); }
        .nav-item:hover, .nav-item.active { background: var(--accent-color); color: white; }
        .logout-btn { color: var(--danger-color); }

        /* --- الحاوية الرئيسية --- */
        .pos-container { flex: 1; display: flex; padding: 20px; gap: 20px; }
        
        /* --- قسم المشتريات والبحث --- */
        .cart-section { flex: 2; background: var(--surface-color); backdrop-filter: var(--glass-blur); border: 1px solid var(--border-color); border-radius: 24px; display: flex; flex-direction: column; padding: 20px; box-shadow: var(--shadow); position: relative; }
        .header-info { display: flex; justify-content: space-between; margin-bottom: 20px; align-items: center; }
        .cashier-badge { background: var(--accent-color); color: white; padding: 5px 12px; border-radius: 20px; font-size: 13px; font-weight: bold; }

        /* --- محرك البحث الذكي --- */
        .search-bar { position: relative; margin-bottom: 15px; z-index: 20; }
        .search-bar input { width: 100%; padding: 18px 20px; border-radius: 16px; border: 1px solid var(--border-color); background: rgba(150,150,150,0.1); color: var(--text-primary); font-size: 16px; outline: none; transition: 0.3s; }
        .search-bar input:focus { border-color: var(--accent-color); box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.1); }
        .search-results { position: absolute; top: 60px; width: 100%; background: var(--surface-color); backdrop-filter: var(--glass-blur); border: 1px solid var(--border-color); border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); max-height: 250px; overflow-y: auto; display: none; }
        .search-item { padding: 15px 20px; border-bottom: 1px solid var(--border-color); cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .search-item:hover { background: var(--accent-color); color: white; }

        /* --- الفاتورة وعناصر السلة --- */
        .cart-items { flex: 1; overflow-y: auto; padding-right: 5px; }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border-bottom: 1px solid var(--border-color); animation: slideIn 0.2s ease; background: rgba(0,0,0,0.02); border-radius: 12px; margin-bottom: 10px; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }
        
        .item-details { flex: 1; }
        .item-details h4 { margin-bottom: 6px; font-size: 15px; }
        .barcode-badge { background: rgba(150,150,150,0.2); padding: 3px 8px; border-radius: 6px; font-size: 11px; }
        
        .item-controls { display: flex; align-items: center; gap: 10px; }
        .item-qty { width: 50px; padding: 8px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-color); color: var(--text-primary); text-align: center; font-size: 14px; }
        .item-discount-input { width: 65px; padding: 8px; border-radius: 8px; border: 1px solid var(--warning-color); background: rgba(255, 149, 0, 0.05); color: var(--text-primary); text-align: center; font-size: 13px; }
        .item-price { font-weight: 700; width: 75px; text-align: left; }
        .btn-remove { background: rgba(255, 59, 48, 0.1); color: var(--danger-color); border: none; width: 32px; height: 32px; border-radius: 8px; cursor: pointer; font-size: 14px; transition: 0.2s; }
        .btn-remove:hover { background: var(--danger-color); color: white; }

        /* --- قسم الدفع والخصم الشامل --- */
        .summary-section { flex: 1.2; background: var(--accent-color); border-radius: 24px; padding: 25px; color: white; display: flex; flex-direction: column; justify-content: space-between; box-shadow: 0 20px 40px rgba(0, 122, 255, 0.3); overflow-y: auto; }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 16px; opacity: 0.9; align-items: center; }
        .total-row { font-size: 30px; font-weight: 800; border-top: 1px solid rgba(255,255,255,0.3); padding-top: 15px; margin-top: 5px; opacity: 1; }
        
        /* أزرار طرق الدفع */
        .control-box { background: rgba(0,0,0,0.15); padding: 15px; border-radius: 16px; margin-bottom: 15px; }
        .control-title { font-size: 14px; font-weight: bold; margin-bottom: 10px; display: block; }
        .payment-btns { display: flex; gap: 8px; }
        .btn-choice { flex: 1; padding: 10px; border: none; border-radius: 10px; background: rgba(255,255,255,0.2); color: white; cursor: pointer; font-weight: bold; transition: 0.2s;}
        .btn-choice.active { background: white; color: var(--accent-color); }

        /* أزرار وحقول الخصم الشامل */
        .discount-controls { display: flex; gap: 8px; margin-bottom: 15px; }
        .btn-disc { flex: 1; padding: 8px; border: none; border-radius: 8px; background: rgba(255,255,255,0.2); color: white; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-disc:hover { background: white; color: var(--accent-color); }
        .global-disc-input { width: 70px; padding: 8px; border: none; border-radius: 8px; text-align: center; font-weight: bold; }
        .global-disc-type { padding: 8px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* حقول التأمين */
        .insurance-toggle { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; cursor: pointer; font-weight: bold;}
        .ins-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .ins-input { width: 100%; padding: 8px; border-radius: 8px; border: none; font-size: 13px; outline: none; }

        .btn-pay { background: white; color: var(--accent-color); width: 100%; padding: 18px; border-radius: 16px; border: none; font-size: 20px; font-weight: 800; cursor: pointer; transition: transform 0.1s; margin-top: 10px; display: flex; justify-content: center; align-items: center; gap: 10px;}
        .btn-pay:active { transform: scale(0.98); }
        .btn-pay:disabled { opacity: 0.7; cursor: not-allowed; }
        .loader { width: 24px; height: 24px; border: 3px solid rgba(0,122,255,0.3); border-radius: 50%; border-top-color: var(--accent-color); animation: spin 1s linear infinite; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="nav-group">
            <button class="nav-item active" title="نقطة البيع">🛒</button>
            <button class="nav-item" title="المخزون">📦</button>
        </div>
        <button class="nav-item logout-btn" onclick="logout()" title="تسجيل خروج">🚪</button>
    </nav>

    <main class="pos-container">
        
        <section class="cart-section">
            <div class="header-info">
                <h2>فاتورة المبيعات</h2>
                <div class="cashier-badge" id="cashierNameDisplay">الكاشير: تحميل...</div>
            </div>

            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="ابحث باسم الدواء، الباركود، أو امسح مباشرة (F2)..." autofocus autocomplete="off">
                <div id="searchResults" class="search-results"></div>
            </div>
            
            <div class="cart-items" id="cartItemsContainer"></div>
        </section>

        <section class="summary-section">
            <div>
                <h3 style="margin-bottom: 15px; font-size: 22px;">إتمام العملية</h3>

                <div class="control-box">
                    <span class="control-title">طريقة الدفع:</span>
                    <div class="payment-btns">
                        <button class="btn-choice active" id="pay_cash" onclick="setPaymentMethod('CASH')">نقدي</button>
                        <button class="btn-choice" id="pay_visa" onclick="setPaymentMethod('VISA')">فيزا</button>
                        <button class="btn-choice" id="pay_cliq" onclick="setPaymentMethod('CLIQ')">كليك</button>
                    </div>
                </div>

                <div class="control-box">
                    <label class="insurance-toggle">
                        <input type="checkbox" id="isInsurance" onchange="toggleInsurance()">
                        <span>مريض مؤمن (تأمين طبي)</span>
                    </label>
                    
                    <div id="insuranceSection" style="display: none;">
                        <div class="ins-fields">
                            <select id="insCompany" class="ins-input">
                                <option value="">جاري تحميل الشركات...</option>
                            </select>
                            <input type="text" id="insNumber" class="ins-input" placeholder="رقم بطاقة التأمين">
                        </div>
                        <div style="margin-top: 10px; display: flex; justify-content: space-between; align-items: center;">
                            <span style="font-size: 13px;">نسبة تحمل المريض (%):</span>
                            <input type="number" id="insCopay" class="ins-input" value="20" min="0" max="100" oninput="renderCart()" style="width: 70px; text-align: center;">
                        </div>
                    </div>
                </div>
                
                <div class="summary-row">
                    <span>المجموع الفرعي:</span>
                    <span id="subtotalDisplay">0.00 د.أ</span>
                </div>

                <div class="discount-controls">
                    <button class="btn-disc" onclick="setGlobalDiscount(10, 'percent')">10%</button>
                    <button class="btn-disc" onclick="setGlobalDiscount(5, 'percent')">5%</button>
                    <input type="number" id="gDiscVal" class="global-disc-input" placeholder="0" min="0" oninput="customGlobalDiscount()">
                    <select id="gDiscType" class="global-disc-type" onchange="customGlobalDiscount()">
                        <option value="percent">%</option>
                        <option value="fixed">د.أ</option>
                    </select>
                </div>

                <div class="summary-row" style="color: #ffde00;">
                    <span>إجمالي الخصومات:</span>
                    <span id="totalDiscountDisplay">0.00 د.أ</span>
                </div>

                <div id="insuranceSummary" style="display: none;">
                    <div class="summary-row" style="color: #34c759; font-weight: bold;">
                        <span>يُسجل ذمة على التأمين:</span>
                        <span id="insDebtDisplay">0.00 د.أ</span>
                    </div>
                </div>

                <div class="summary-row total-row">
                    <span id="totalLabel">المطلوب دفعه:</span>
                    <span id="grandTotal">0.00 د.أ</span>
                </div>
            </div>
            
            <div>
                <button class="btn-pay" id="payBtn" onclick="processPayment()">
                    <span id="btnText">تأكيد العملية (Enter)</span>
                    <div id="payLoader" class="loader"></div>
                </button>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        // 🔴 استيراد doc, updateDoc, increment لتحديث الذمم
        import { getFirestore, collection, addDoc, serverTimestamp, getDocs, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // 1. الجلسة
        const sessionStr = sessionStorage.getItem('pharmacy_session');
        if (!sessionStr) window.location.href = 'login.html';
        const sessionData = JSON.parse(sessionStr);
        document.getElementById('cashierNameDisplay').textContent = `الكاشير: ${sessionData.name}`;

        // 2. Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDP6FlbjAeUqut_79qW0T3rPSvfsjPdHfA",
            authDomain: "gen-lang-client-0023266031.firebaseapp.com",
            projectId: "gen-lang-client-0023266031",
            storageBucket: "gen-lang-client-0023266031.firebasestorage.app",
            messagingSenderId: "1052398695491",
            appId: "1:1052398695491:web:1c29151c816929cdc510f6"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app, "ai-studio-2f881b3f-5867-4dfd-b360-c85f26c6ded4");
        const auth = getAuth(app);

        // 3. المتغيرات
        let cart = [];
        let catalog = []; 
        let globalDiscount = { value: 0, type: 'percent' };
        let paymentMethod = 'CASH';

        const searchInput = document.getElementById('searchInput');
        const searchResults = document.getElementById('searchResults');

        // 4. تحميل البيانات (الأدوية وشركات التأمين)
async function loadData() {
            try {
                // 1. تحميل الأدوية
                searchInput.placeholder = "جاري تحميل الأدوية...";
                const querySnapshot = await getDocs(collection(db, "products"));
                catalog = []; // تصفير الكتالوج قبل التحميل
                querySnapshot.forEach((doc) => { catalog.push({ id: doc.id, ...doc.data() }); });
                searchInput.placeholder = `تم تحميل ${catalog.length} منتج! ابحث بالاسم أو الباركود...`;

                // 2. تحميل شركات التأمين (تأكد من كتابة اسم المجموعة صح: insurance_companies)
                const insSelect = document.getElementById('insCompany');
                const insSnap = await getDocs(collection(db, "insurance_companies"));
                
                if (insSnap.empty) {
                    insSelect.innerHTML = '<option value="">لا يوجد شركات تأمين مسجلة</option>';
                } else {
                    insSelect.innerHTML = '<option value="">-- اختر شركة التأمين --</option>';
                    insSnap.forEach(doc => {
                        const data = doc.data();
                        insSelect.innerHTML += `<option value="${doc.id}">${data.name}</option>`;
                    });
                }
            } catch (error) {
                console.error("خطأ في تحميل البيانات:", error);
                // إذا ظهر لك هذا التنبيه، يعني المشكلة في الـ Rules
                alert("خطأ في جلب شركات التأمين: تأكد من إضافتها في Firebase بالاسم الصحيح insurance_companies");
            }
        }
        onAuthStateChanged(auth, (user) => {
            if (user) loadData(); 
            else window.location.href = 'login.html'; 
        });

        // 5. طرق الدفع والتأمين
        window.setPaymentMethod = function(method) {
            paymentMethod = method;
            document.querySelectorAll('.btn-choice').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`pay_${method.toLowerCase()}`).classList.add('active');
        };

        window.toggleInsurance = function() {
            const isIns = document.getElementById('isInsurance').checked;
            document.getElementById('insuranceSection').style.display = isIns ? 'block' : 'none';
            document.getElementById('insuranceSummary').style.display = isIns ? 'block' : 'none';
            document.getElementById('totalLabel').textContent = isIns ? 'يتحمل المريض (المطلوب دفعه):' : 'المطلوب دفعه:';
            renderCart();
        };

        // 6. البحث
        searchInput.addEventListener('input', function() {
            const val = this.value.trim().toLowerCase();
            searchResults.innerHTML = '';
            if (val.length < 1) { searchResults.style.display = 'none'; return; }

            const matches = catalog.filter(p => 
                (p.barcode && p.barcode.includes(val)) || 
                (p.name && p.name.toLowerCase().includes(val))
            ).slice(0, 8);

            if (matches.length > 0) {
                matches.forEach(p => {
                    const div = document.createElement('div');
                    div.className = 'search-item';
                    div.innerHTML = `<span class="search-item-name">${p.name}</span> <span>${p.price} د.أ</span>`;
                    div.onclick = () => { addToCartDirectly(p); searchInput.value = ''; searchResults.style.display = 'none'; searchInput.focus(); };
                    searchResults.appendChild(div);
                });
                searchResults.style.display = 'block';
            } else {
                searchResults.style.display = 'none';
            }
        });

        // 7. إدارة السلة
        window.addToCartDirectly = function(product) {
            const existingItem = cart.find(item => item.barcode === product.barcode);
            if (existingItem) { existingItem.qty += 1; } 
            else { cart.push({ ...product, qty: 1, itemDiscountPercent: 0 }); }
            playBeep(); renderCart();
        }
        function handleExactMatch(text) {
            const product = catalog.find(p => p.barcode === text || p.name === text);
            if (product) { addToCartDirectly(product); searchInput.value = ''; } 
            else { alert(`لم يتم العثور على منتج: ${text}`); }
        }
        window.updateQty = function(barcode, newQty) {
            const item = cart.find(item => item.barcode === barcode);
            if (item) { item.qty = parseInt(newQty) || 1; renderCart(); }
        }
        window.updateItemDiscount = function(barcode, discVal) {
            const item = cart.find(item => item.barcode === barcode);
            if (item) { 
                let val = parseFloat(discVal) || 0;
                if(val > 100) val = 100; 
                item.itemDiscountPercent = val; renderCart(); 
            }
        }
        window.removeFromCart = function(barcode) {
            cart = cart.filter(item => item.barcode !== barcode); renderCart();
        }

        // 8. الخصم الشامل
        window.setGlobalDiscount = function(val, type) {
            document.getElementById('gDiscVal').value = val;
            document.getElementById('gDiscType').value = type;
            customGlobalDiscount();
        }
        window.customGlobalDiscount = function() {
            const val = parseFloat(document.getElementById('gDiscVal').value) || 0;
            const type = document.getElementById('gDiscType').value;
            globalDiscount = { value: val, type: type };
            renderCart();
        }

        // 9. الحسابات الرئيسية (شاملة الخصومات والتأمين)
        window.renderCart = function() {
            const container = document.getElementById('cartItemsContainer');
            container.innerHTML = '';
            
            let subtotal = 0; 
            let totalItemDiscounts = 0; 

            cart.forEach(item => {
                let itemBasePrice = item.price * item.qty;
                let itemDiscAmount = itemBasePrice * (item.itemDiscountPercent / 100);
                let itemFinalPrice = itemBasePrice - itemDiscAmount;
                
                subtotal += itemFinalPrice;
                totalItemDiscounts += itemDiscAmount;

                container.innerHTML += `
                    <div class="item-row">
                        <div class="item-details">
                            <h4>${item.name}</h4>
                            <span class="barcode-badge">#${item.barcode}</span>
                        </div>
                        <div class="item-controls">
                            <input type="number" class="item-discount-input" placeholder="خصم %" min="0" max="100" value="${item.itemDiscountPercent > 0 ? item.itemDiscountPercent : ''}" onchange="updateItemDiscount('${item.barcode}', this.value)" title="خصم على الصنف (%)">
                            <input type="number" class="item-qty" min="1" value="${item.qty}" onchange="updateQty('${item.barcode}', this.value)" title="الكمية">
                            <div class="item-price">${itemFinalPrice.toFixed(2)}</div>
                            <button class="btn-remove" onclick="removeFromCart('${item.barcode}')">✖</button>
                        </div>
                    </div>
                `;
            });

            // حساب الخصم الشامل
            let finalGlobalDiscAmount = 0;
            if(globalDiscount.type === 'percent') { finalGlobalDiscAmount = subtotal * (globalDiscount.value / 100); } 
            else { finalGlobalDiscAmount = globalDiscount.value; }
            if(finalGlobalDiscAmount > subtotal) finalGlobalDiscAmount = subtotal;

            let invoiceTotalAfterDiscount = subtotal - finalGlobalDiscAmount; // إجمالي الفاتورة النهائي
            let absoluteTotalDiscount = totalItemDiscounts + finalGlobalDiscAmount;

            // حسابات التأمين
            const isIns = document.getElementById('isInsurance').checked;
            const copayPercent = parseFloat(document.getElementById('insCopay').value) || 0;
            
            let patientPays = invoiceTotalAfterDiscount;
            let insuranceDebt = 0;

            if (isIns) {
                patientPays = invoiceTotalAfterDiscount * (copayPercent / 100);
                insuranceDebt = invoiceTotalAfterDiscount - patientPays;
            }

            // تحديث الواجهة
            document.getElementById('subtotalDisplay').innerText = (subtotal + totalItemDiscounts).toFixed(2) + ' د.أ';
            document.getElementById('totalDiscountDisplay').innerText = absoluteTotalDiscount.toFixed(2) + ' د.أ';
            document.getElementById('insDebtDisplay').innerText = insuranceDebt.toFixed(2) + ' د.أ';
            document.getElementById('grandTotal').innerText = patientPays.toFixed(2) + ' د.أ';
            
            // حفظ القيم للدفع
            window.finalCalculation = { 
                subtotal: subtotal + totalItemDiscounts,
                totalDiscount: absoluteTotalDiscount,
                invoiceTotalAfterDiscount: invoiceTotalAfterDiscount,
                patientPays: patientPays,
                insuranceDebt: insuranceDebt
            };
        }

        // 10. الكيبورد
        let barcodeBuffer = ''; let barcodeTimer = null;
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F2') { e.preventDefault(); searchInput.focus(); return; }
            if (e.key === 'Enter' && cart.length > 0 && e.target.tagName !== 'INPUT' && e.target.tagName !== 'SELECT') { processPayment(); return; }
            if (e.key === 'Enter' && barcodeBuffer.length > 3) { handleExactMatch(barcodeBuffer); barcodeBuffer = ''; e.preventDefault(); return; }
            if (e.key.length === 1 && !e.ctrlKey && !e.altKey && e.target.tagName !== 'INPUT') {
                barcodeBuffer += e.key; clearTimeout(barcodeTimer); barcodeTimer = setTimeout(() => { barcodeBuffer = ''; }, 50); 
            }
        });
        searchInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && this.value.trim() !== '') { handleExactMatch(this.value.trim()); e.preventDefault(); searchResults.style.display = 'none'; }
        });

        // 11. عملية الدفع (متوافقة 100% مع كل الميزات)
        window.processPayment = async function() {
            if(cart.length === 0) return;
            
            const isIns = document.getElementById('isInsurance').checked;
            const insCompSelect = document.getElementById('insCompany');
            const insCompId = insCompSelect.value;
            const insCompName = insCompSelect.options[insCompSelect.selectedIndex]?.text || "";
            const insNum = document.getElementById('insNumber').value;

            if (isIns && (!insCompId || !insNum)) {
                alert("يرجى اختيار شركة التأمين وإدخال رقم البطاقة!");
                return;
            }

            const payBtn = document.getElementById('payBtn');
            const btnText = document.getElementById('btnText');
            const payLoader = document.getElementById('payLoader');

            payBtn.disabled = true; btnText.style.display = 'none'; payLoader.style.display = 'block';

            try {
                // حفظ الفاتورة في المبيعات
                const invoiceData = {
                    branchId: sessionData.branchId,
                    cashierId: sessionData.uid,
                    cashierName: sessionData.name,
                    paymentMethod: paymentMethod,
                    isInsurance: isIns,
                    insuranceDetails: isIns ? {
                        companyId: insCompId,
                        companyName: insCompName,
                        memberNumber: insNum,
                        copayPercent: parseFloat(document.getElementById('insCopay').value),
                        debtAmount: window.finalCalculation.insuranceDebt
                    } : null,
                    items: cart.map(item => ({ 
                        id: item.id, name: item.name, basePrice: item.price, qty: item.qty, discountPercent: item.itemDiscountPercent, finalPrice: item.price * item.qty * (1 - (item.itemDiscountPercent/100))
                    })),
                    subtotal: window.finalCalculation.subtotal,
                    globalDiscountApplied: globalDiscount,
                    totalDiscountAmount: window.finalCalculation.totalDiscount,
                    totalInvoiceAmount: window.finalCalculation.invoiceTotalAfterDiscount,
                    amountPaidByPatient: window.finalCalculation.patientPays,
                    timestamp: serverTimestamp()
                };
                await addDoc(collection(db, "sales"), invoiceData);

                // 🔴 رفع الذمة التلقائي لشركة التأمين
                if (isIns && window.finalCalculation.insuranceDebt > 0) {
                    const compRef = doc(db, "insurance_companies", insCompId);
                    await updateDoc(compRef, {
                        total_debt: increment(window.finalCalculation.insuranceDebt)
                    });
                }
                
                // تصفير الواجهة بنجاح
                cart = []; 
                document.getElementById('gDiscVal').value = '';
                globalDiscount = { value: 0, type: 'percent' };
                document.getElementById('isInsurance').checked = false;
                document.getElementById('insNumber').value = '';
                toggleInsurance();
                setPaymentMethod('CASH'); // إعادة للوضع الافتراضي
                renderCart(); 
                searchInput.focus();
                
            } catch (error) {
                alert("حدث خطأ (تأكد من تحديث Security Rules لتشمل شركة التأمين): \n" + error.message);
            } finally {
                payBtn.disabled = false; btnText.style.display = 'block'; payLoader.style.display = 'none';
            }
        }

        window.logout = function() { sessionStorage.removeItem('pharmacy_session'); auth.signOut().then(() => { window.location.href = 'login.html'; }); }
        function playBeep() { try { const ctx = new (window.AudioContext || window.webkitAudioContext)(); const osc = ctx.createOscillator(); osc.connect(ctx.destination); osc.frequency.value = 900; osc.start(); osc.stop(ctx.currentTime + 0.1); } catch(e) {} }
    </script>
</body>
</html>
