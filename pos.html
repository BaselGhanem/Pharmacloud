<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نقطة البيع المتكاملة - PharmaCloud</title>
    <style>
        /* --- المتغيرات والتصميم الحديث (دمج الكودين) --- */
        :root {
            --bg-color: #f4f7f6;
            --surface-color: rgba(255, 255, 255, 0.85);
            --border-color: rgba(0, 0, 0, 0.1);
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --accent-color: #007aff;
            --danger-color: #ff3b30;
            --success-color: #34c759;
            --warning-color: #ff9500;
            --glass-blur: blur(20px);
            --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #1c1c1e;
                --surface-color: rgba(44, 44, 46, 0.85);
                --border-color: rgba(255, 255, 255, 0.1);
                --text-primary: #f5f5f7;
                --text-secondary: #a1a1a6;
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-primary); height: 100vh; display: flex; overflow: hidden; }

        /* --- القائمة الجانبية المحسنة --- */
        .sidebar { width: 80px; background: var(--surface-color); backdrop-filter: var(--glass-blur); border-left: 1px solid var(--border-color); display: flex; flex-direction: column; align-items: center; padding: 20px 0; z-index: 10; justify-content: space-between;}
        .nav-group { display: flex; flex-direction: column; width: 100%; align-items: center;}
        .nav-item { width: 50px; height: 50px; border-radius: 14px; margin-bottom: 15px; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.2s; background: transparent; border: none; font-size: 22px; color: var(--text-primary); }
        .nav-item:hover, .nav-item.active { background: var(--accent-color); color: white; }
        .logout-btn { color: var(--danger-color); }

        /* --- الحاوية الرئيسية --- */
        .pos-container { flex: 1; display: flex; padding: 20px; gap: 20px; }
        
        /* --- قسم المشتريات والبحث --- */
        .cart-section { flex: 2; background: var(--surface-color); backdrop-filter: var(--glass-blur); border: 1px solid var(--border-color); border-radius: 24px; display: flex; flex-direction: column; padding: 20px; box-shadow: var(--shadow); position: relative; }
        .header-info { display: flex; justify-content: space-between; margin-bottom: 20px; align-items: center; flex-wrap: wrap; gap: 10px;}
        .cashier-badge { background: var(--accent-color); color: white; padding: 5px 12px; border-radius: 20px; font-size: 13px; font-weight: bold; }
        .edit-badge { background: var(--warning-color); color: white; padding: 4px 10px; border-radius: 20px; font-size: 12px; display: none; }

        /* شريط التنقل بين الفواتير */
        .invoice-navigation { display: flex; gap: 10px; align-items: center; margin-bottom: 15px; background: rgba(0,0,0,0.03); padding: 8px 12px; border-radius: 40px; }
        .nav-btn { background: white; border: 1px solid var(--border-color); padding: 5px 15px; border-radius: 30px; cursor: pointer; font-size: 13px; font-weight: bold; transition: 0.2s; }
        .nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .nav-btn:hover:not(:disabled) { background: var(--accent-color); color: white; border-color: var(--accent-color);}
        #navStatus { font-size: 14px; font-weight: 500; background: rgba(0,0,0,0.05); padding: 4px 12px; border-radius: 20px;}

        /* --- محرك البحث الذكي --- */
        .search-bar { position: relative; margin-bottom: 15px; z-index: 20; }
        .search-bar input { width: 100%; padding: 18px 20px; border-radius: 16px; border: 1px solid var(--border-color); background: rgba(150,150,150,0.1); color: var(--text-primary); font-size: 16px; outline: none; transition: 0.3s; }
        .search-bar input:focus { border-color: var(--accent-color); box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.1); }
        .search-results { position: absolute; top: 60px; width: 100%; background: var(--surface-color); backdrop-filter: var(--glass-blur); border: 1px solid var(--border-color); border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); max-height: 250px; overflow-y: auto; display: none; z-index: 30; }
        .search-item { padding: 15px 20px; border-bottom: 1px solid var(--border-color); cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .search-item:hover { background: var(--accent-color); color: white; }

        /* --- الفاتورة وعناصر السلة --- */
        .cart-items { flex: 1; overflow-y: auto; padding-left: 5px; }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border-bottom: 1px solid var(--border-color); animation: slideIn 0.2s ease; background: rgba(0,0,0,0.02); border-radius: 12px; margin-bottom: 8px; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }
        .item-details { flex: 1; }
        .item-details h4 { margin-bottom: 6px; font-size: 15px; }
        .barcode-badge { background: rgba(150,150,150,0.2); padding: 3px 8px; border-radius: 6px; font-size: 11px; }
        .item-controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .item-qty { width: 55px; padding: 8px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-color); color: var(--text-primary); text-align: center; font-size: 14px; }
        .item-discount-input { width: 65px; padding: 8px; border-radius: 8px; border: 1px solid var(--warning-color); background: rgba(255, 149, 0, 0.05); text-align: center; }
        .item-price { font-weight: 700; width: 70px; text-align: left; }
        .btn-remove { background: rgba(255, 59, 48, 0.1); color: var(--danger-color); border: none; width: 32px; height: 32px; border-radius: 8px; cursor: pointer; font-size: 14px; transition: 0.2s; }
        .btn-remove:hover { background: var(--danger-color); color: white; }

        /* --- قسم الدفع والخصم الشامل --- */
        .summary-section { flex: 1.2; background: var(--accent-color); border-radius: 24px; padding: 25px; color: white; display: flex; flex-direction: column; justify-content: space-between; box-shadow: 0 20px 40px rgba(0, 122, 255, 0.3); overflow-y: auto; }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 16px; opacity: 0.9; align-items: center; }
        .total-row { font-size: 30px; font-weight: 800; border-top: 1px solid rgba(255,255,255,0.3); padding-top: 15px; margin-top: 5px; opacity: 1; }
        
        .control-box { background: rgba(0,0,0,0.15); padding: 15px; border-radius: 16px; margin-bottom: 15px; }
        .control-title { font-size: 14px; font-weight: bold; margin-bottom: 10px; display: block; }
        .payment-btns { display: flex; gap: 8px; }
        .btn-choice { flex: 1; padding: 10px; border: none; border-radius: 10px; background: rgba(255,255,255,0.2); color: white; cursor: pointer; font-weight: bold; transition: 0.2s;}
        .btn-choice.active { background: white; color: var(--accent-color); }

        .discount-controls { display: flex; gap: 8px; margin: 10px 0; align-items: center; }
        .btn-disc { padding: 8px 12px; border: none; border-radius: 8px; background: rgba(255,255,255,0.2); color: white; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-disc:hover { background: white; color: var(--accent-color); }
        .global-disc-input { width: 70px; padding: 8px; border-radius: 8px; border: none; text-align: center; font-weight: bold; }
        .global-disc-type { padding: 8px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }

        .insurance-toggle { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; cursor: pointer; font-weight: bold;}
        .ins-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .ins-input { width: 100%; padding: 8px; border-radius: 8px; border: none; font-size: 13px; outline: none; }

        .print-toggle { display: flex; align-items: center; gap: 10px; margin-top: 10px; font-size: 14px; cursor: pointer; background: rgba(0,0,0,0.1); padding: 8px; border-radius: 30px; justify-content: center;}
        .btn-pay { background: white; color: var(--accent-color); width: 100%; padding: 18px; border-radius: 16px; border: none; font-size: 20px; font-weight: 800; cursor: pointer; transition: transform 0.1s; margin-top: 15px; display: flex; justify-content: center; align-items: center; gap: 10px;}
        .btn-pay:active { transform: scale(0.98); }
        .btn-pay:disabled { opacity: 0.7; cursor: not-allowed; }
        .loader { width: 24px; height: 24px; border: 3px solid rgba(0,122,255,0.3); border-radius: 50%; border-top-color: var(--accent-color); animation: spin 1s linear infinite; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- منطقة الطباعة --- */
        #receipt-print-area { display: none; }
        @media print {
            body * { visibility: hidden; }
            #receipt-print-area, #receipt-print-area * { visibility: visible; }
            #receipt-print-area { display: block; position: absolute; left: 0; top: 0; width: 80mm; padding: 5mm; background: white; color: black; font-size: 12px; line-height: 1.4; }
            .receipt-header { text-align: center; border-bottom: 1px dashed black; padding-bottom: 10px; margin-bottom: 10px; }
            .receipt-logo { font-size: 24px; font-weight: bold; display: block; }
            .receipt-table { width: 100%; border-collapse: collapse; margin: 10px 0; }
            .receipt-table th, .receipt-table td { border-bottom: 1px solid #ccc; padding: 5px; text-align: right; }
            .receipt-total-box { border-top: 1px dashed black; padding-top: 5px; margin-top: 10px; }
        }
    </style>
</head>
<body>

    <div id="receipt-print-area"></div>

    <nav class="sidebar">
        <div class="nav-group">
            <button class="nav-item active" title="نقطة البيع">🛒</button>
            <button class="nav-item" title="المخزون" onclick="alert('لوحة المخزون قريباً')">📦</button>
        </div>
        <button class="nav-item logout-btn" onclick="logout()" title="تسجيل خروج">🚪</button>
    </nav>

    <main class="pos-container">
        <section class="cart-section">
            <div class="header-info">
                <h2>فاتورة المبيعات</h2>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <div class="cashier-badge" id="cashierNameDisplay">الكاشير: ...</div>
                    <div class="edit-badge" id="editLabel">وضع التعديل</div>
                </div>
            </div>

            <div class="invoice-navigation">
                <button class="nav-btn" id="btnPrev" onclick="navigateInvoices('prev')">→ سابقة</button>
                <span id="navStatus">فاتورة جديدة</span>
                <button class="nav-btn" id="btnNext" onclick="navigateInvoices('next')" disabled>تالية ←</button>
                <button class="nav-btn" onclick="resetToNew()" style="background:var(--success-color); color:white; margin-right:auto;">+ جديدة</button>
            </div>

            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="ابحث بالاسم، الباركود (F2) أو امسح مباشرة..." autofocus autocomplete="off">
                <div id="searchResults" class="search-results"></div>
            </div>
            
            <div class="cart-items" id="cartItemsContainer"></div>
        </section>

        <section class="summary-section">
            <div>
                <h3 style="margin-bottom: 15px;">إتمام العملية</h3>

                <div class="control-box">
                    <span class="control-title">طريقة الدفع:</span>
                    <div class="payment-btns">
                        <button class="btn-choice active" id="pay_cash" onclick="setPaymentMethod('CASH')">نقدي</button>
                        <button class="btn-choice" id="pay_visa" onclick="setPaymentMethod('VISA')">فيزا</button>
                        <button class="btn-choice" id="pay_cliq" onclick="setPaymentMethod('CLIQ')">كليك</button>
                    </div>
                </div>

                <div class="control-box">
                    <label class="insurance-toggle">
                        <input type="checkbox" id="isInsurance" onchange="toggleInsurance()">
                        <span>تأمين طبي</span>
                    </label>
                    <div id="insuranceSection" style="display: none;">
                        <div class="ins-fields">
                            <select id="insCompany" class="ins-input"><option>تحميل...</option></select>
                            <input type="text" id="insNumber" class="ins-input" placeholder="رقم بطاقة التأمين">
                        </div>
                        <div style="margin-top: 10px; display: flex; justify-content: space-between;">
                            <span>تحمل المريض %:</span>
                            <input type="number" id="insCopay" class="ins-input" value="20" min="0" max="100" oninput="renderCart()" style="width:70px">
                        </div>
                    </div>
                </div>
                
                <div class="summary-row"><span>المجموع الفرعي:</span><span id="subtotalDisplay">0.00 د.أ</span></div>

                <div class="discount-controls">
                    <button class="btn-disc" onclick="setGlobalDiscount(10,'percent')">10%</button>
                    <button class="btn-disc" onclick="setGlobalDiscount(5,'percent')">5%</button>
                    <input type="number" id="gDiscVal" class="global-disc-input" placeholder="0" min="0" oninput="customGlobalDiscount()">
                    <select id="gDiscType" class="global-disc-type" onchange="customGlobalDiscount()">
                        <option value="percent">%</option><option value="fixed">د.أ</option>
                    </select>
                </div>

                <div class="summary-row" style="color:#ffde00;"><span>إجمالي الخصومات:</span><span id="totalDiscountDisplay">0.00 د.أ</span></div>
                <div id="insuranceSummary" style="display:none;"><div class="summary-row" style="color:#34c759;"><span>ذمة التأمين:</span><span id="insDebtDisplay">0.00 د.أ</span></div></div>
                <div class="summary-row total-row"><span id="totalLabel">المطلوب دفعه:</span><span id="grandTotal">0.00 د.أ</span></div>
                
                <label class="print-toggle">
                    <input type="checkbox" id="autoPrint" checked> 🖨️ طباعة فاتورة تلقائياً
                </label>
            </div>
            
            <button class="btn-pay" id="payBtn" onclick="processPayment()">
                <span id="btnText">تأكيد العملية (Enter)</span>
                <div id="payLoader" class="loader"></div>
            </button>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, deleteDoc, serverTimestamp, getDocs, doc, updateDoc, increment, query, where, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Config
        const firebaseConfig = {
            apiKey: "AIzaSyDP6FlbjAeUqut_79qW0T3rPSvfsjPdHfA",
            authDomain: "gen-lang-client-0023266031.firebaseapp.com",
            projectId: "gen-lang-client-0023266031",
            storageBucket: "gen-lang-client-0023266031.firebasestorage.app",
            messagingSenderId: "1052398695491",
            appId: "1:1052398695491:web:1c29151c816929cdc510f6"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app, "ai-studio-2f881b3f-5867-4dfd-b360-c85f26c6ded4");
        const auth = getAuth(app);

        // جلسة
        const sessionData = JSON.parse(sessionStorage.getItem('pharmacy_session') || 'null');
        if (!sessionData) window.location.href = 'login.html';
        document.getElementById('cashierNameDisplay').textContent = `الكاشير: ${sessionData.name}`;

        // متغيرات
        let cart = [];
        let catalog = [];
        let recentSales = [];
        let currentIndex = -1;
        let isEditMode = false;
        let paymentMethod = 'CASH';
        let globalDiscount = { value: 0, type: 'percent' };
        let barcodeBuffer = '';
        let barcodeTimer = null;

        // دوال مساعدة
        function playBeep() { try { const ctx = new (window.AudioContext || window.webkitAudioContext)(); const osc = ctx.createOscillator(); osc.connect(ctx.destination); osc.frequency.value = 900; osc.start(); osc.stop(ctx.currentTime + 0.1); } catch(e) {} }

        // تحميل البيانات
        async function loadData() {
            try {
                const prodSnap = await getDocs(collection(db, "products"));
                catalog = [];
                prodSnap.forEach(d => catalog.push({ id: d.id, ...d.data() }));
                const insSnap = await getDocs(collection(db, "insurance_companies"));
                const insSelect = document.getElementById('insCompany');
                insSelect.innerHTML = '<option value="">-- اختر الشركة --</option>';
                insSnap.forEach(d => insSelect.innerHTML += `<option value="${d.id}">${d.data().name}</option>`);
                await loadRecentSales();
            } catch(e) { console.error(e); alert("خطأ في تحميل البيانات"); }
        }

        async function loadRecentSales() {
            const today = new Date(); today.setHours(0,0,0,0);
            const q = query(collection(db, "sales"), where("timestamp", ">=", today), orderBy("timestamp", "desc"), limit(15));
            const snap = await getDocs(q);
            recentSales = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        }

        // عرض السلة والحسابات (دمج منطق الخصم والتأمين)
        window.renderCart = function() {
            const container = document.getElementById('cartItemsContainer');
            container.innerHTML = '';
            let subtotalRaw = 0; // مجموع الأصناف قبل خصومات الأصناف
            let totalItemDiscount = 0;
            cart.forEach(item => {
                let itemBase = item.price * item.qty;
                let itemDiscAmt = itemBase * (item.itemDiscountPercent / 100);
                let finalItem = itemBase - itemDiscAmt;
                subtotalRaw += finalItem;
                totalItemDiscount += itemDiscAmt;
                container.innerHTML += `
                    <div class="item-row">
                        <div class="item-details"><h4>${item.name}</h4><span class="barcode-badge">${item.barcode}</span></div>
                        <div class="item-controls">
                            <input type="number" class="item-discount-input" placeholder="خصم %" min="0" max="100" value="${item.itemDiscountPercent||''}" onchange="updateItemDiscount('${item.barcode}', this.value)">
                            <input type="number" class="item-qty" value="${item.qty}" min="1" onchange="updateQty('${item.barcode}', this.value)">
                            <div class="item-price">${finalItem.toFixed(2)}</div>
                            <button class="btn-remove" onclick="removeFromCart('${item.barcode}')">✖</button>
                        </div>
                    </div>
                `;
            });
            let globalAmt = (globalDiscount.type === 'percent') ? subtotalRaw * (globalDiscount.value/100) : globalDiscount.value;
            if(globalAmt > subtotalRaw) globalAmt = subtotalRaw;
            let invoiceTotal = subtotalRaw - globalAmt;
            let totalDiscount = totalItemDiscount + globalAmt;
            const isIns = document.getElementById('isInsurance').checked;
            const copay = parseFloat(document.getElementById('insCopay').value) || 0;
            let patientPays = invoiceTotal;
            let insDebt = 0;
            if(isIns) {
                patientPays = invoiceTotal * (copay/100);
                insDebt = invoiceTotal - patientPays;
            }
            document.getElementById('subtotalDisplay').innerText = (subtotalRaw + totalItemDiscount).toFixed(2) + ' د.أ';
            document.getElementById('totalDiscountDisplay').innerText = totalDiscount.toFixed(2) + ' د.أ';
            document.getElementById('insDebtDisplay').innerText = insDebt.toFixed(2) + ' د.أ';
            document.getElementById('grandTotal').innerText = patientPays.toFixed(2) + ' د.أ';
            document.getElementById('totalLabel').innerHTML = isIns ? 'يتحمل المريض:' : 'المطلوب دفعه:';
            window.currentInvoiceData = { subtotalRaw, totalDiscount, invoiceTotal, patientPays, insDebt };
        };

        // دوال السلة والبحث
        window.addToCartDirectly = (product) => {
            let existing = cart.find(i => i.barcode === product.barcode);
            if(existing) existing.qty += 1;
            else cart.push({ ...product, qty: 1, itemDiscountPercent: 0 });
            playBeep(); renderCart();
        };
        window.updateQty = (bc, val) => { let i = cart.find(i=>i.barcode===bc); if(i){ i.qty = parseInt(val)||1; renderCart(); } };
        window.updateItemDiscount = (bc, val) => { let i = cart.find(i=>i.barcode===bc); if(i){ i.itemDiscountPercent = Math.min(100, parseFloat(val)||0); renderCart(); } };
        window.removeFromCart = (bc) => { cart = cart.filter(i=>i.barcode!==bc); renderCart(); };
        window.setGlobalDiscount = (val,type) => { document.getElementById('gDiscVal').value = val; document.getElementById('gDiscType').value = type; customGlobalDiscount(); };
        window.customGlobalDiscount = () => { globalDiscount = { value: parseFloat(document.getElementById('gDiscVal').value)||0, type: document.getElementById('gDiscType').value }; renderCart(); };
        window.setPaymentMethod = (m) => { paymentMethod = m; document.querySelectorAll('.btn-choice').forEach(b=>b.classList.remove('active')); document.getElementById(`pay_${m.toLowerCase()}`).classList.add('active'); };
        window.toggleInsurance = () => { let isIns = document.getElementById('isInsurance').checked; document.getElementById('insuranceSection').style.display = isIns ? 'block' : 'none'; document.getElementById('insuranceSummary').style.display = isIns ? 'block' : 'none'; renderCart(); };

        // البحث
        const searchInput = document.getElementById('searchInput');
        const searchResults = document.getElementById('searchResults');
        searchInput.addEventListener('input', function() {
            let val = this.value.trim().toLowerCase();
            searchResults.innerHTML = '';
            if(val.length < 1) { searchResults.style.display = 'none'; return; }
            let matches = catalog.filter(p => (p.barcode && p.barcode.includes(val)) || (p.name && p.name.toLowerCase().includes(val))).slice(0,7);
            if(matches.length) {
                matches.forEach(p => {
                    let div = document.createElement('div'); div.className = 'search-item';
                    div.innerHTML = `<span>${p.name}</span> <span>${p.price} د.أ</span>`;
                    div.onclick = () => { addToCartDirectly(p); searchInput.value = ''; searchResults.style.display = 'none'; searchInput.focus(); };
                    searchResults.appendChild(div);
                });
                searchResults.style.display = 'block';
            } else searchResults.style.display = 'none';
        });
        function handleExactMatch(text) {
            let prod = catalog.find(p => p.barcode === text || p.name === text);
            if(prod) addToCartDirectly(prod);
            else alert(`المنتج "${text}" غير موجود`);
        }
        // باركود سريع
        document.addEventListener('keydown', (e) => {
            if(e.key === 'F2') { e.preventDefault(); searchInput.focus(); return; }
            if(e.key === 'Enter' && cart.length && e.target.tagName !== 'INPUT' && e.target.tagName !== 'SELECT') { processPayment(); return; }
            if(e.key === 'Enter' && barcodeBuffer.length > 3) { handleExactMatch(barcodeBuffer); barcodeBuffer = ''; e.preventDefault(); return; }
            if(e.key.length === 1 && !e.ctrlKey && !e.altKey && e.target.tagName !== 'INPUT') {
                barcodeBuffer += e.key; clearTimeout(barcodeTimer); barcodeTimer = setTimeout(() => { barcodeBuffer = ''; }, 50);
            }
        });
        searchInput.addEventListener('keypress', (e) => { if(e.key === 'Enter' && this.value?.trim()) handleExactMatch(searchInput.value.trim()); });

        // الملاحة بين الفواتير
        window.navigateInvoices = async (dir) => {
            if(dir === 'prev') currentIndex++; else currentIndex--;
            if(currentIndex >= recentSales.length) currentIndex = recentSales.length-1;
            if(currentIndex < 0) { resetToNew(); return; }
            const sale = recentSales[currentIndex];
            isEditMode = true; cart = sale.items.map(i => ({ ...i, itemDiscountPercent: i.discountPercent || 0, price: i.basePrice || i.price }));
            paymentMethod = sale.paymentMethod || 'CASH';
            globalDiscount = sale.globalDiscountApplied || { value:0, type:'percent' };
            document.getElementById('editLabel').style.display = 'flex';
            document.getElementById('navStatus').textContent = `فاتورة #${sale.id.slice(-6)}`;
            document.getElementById('btnNext').disabled = false;
            setPaymentMethod(paymentMethod);
            document.getElementById('gDiscVal').value = globalDiscount.value;
            document.getElementById('gDiscType').value = globalDiscount.type;
            document.getElementById('isInsurance').checked = sale.isInsurance || false;
            if(sale.isInsurance && sale.insuranceDetails) {
                document.getElementById('insCompany').value = sale.insuranceDetails.companyId;
                document.getElementById('insNumber').value = sale.insuranceDetails.memberNumber;
                document.getElementById('insCopay').value = sale.insuranceDetails.copayPercent;
            } else { document.getElementById('insNumber').value = ''; }
            toggleInsurance(); renderCart();
        };
        window.resetToNew = function() {
            isEditMode = false; currentIndex = -1; cart = []; globalDiscount = { value:0, type:'percent' };
            document.getElementById('editLabel').style.display = 'none';
            document.getElementById('navStatus').textContent = 'فاتورة جديدة';
            document.getElementById('btnNext').disabled = true;
            document.getElementById('isInsurance').checked = false;
            document.getElementById('gDiscVal').value = 0;
            document.getElementById('insNumber').value = '';
            document.getElementById('insCompany').value = '';
            toggleInsurance(); renderCart(); searchInput.focus();
        };

        // إنشاء قالب الطباعة
        function generateReceiptHTML(data) {
            let itemsHtml = data.items.map(i => `<tr><td>${i.name}</td><td>${i.qty}</td><td>${(i.price * i.qty).toFixed(2)}</td>`).join('');
            return `<div class="receipt-header"><span class="receipt-logo">☁️ صيدلية السحاب</span><p>${new Date().toLocaleString('ar-JO')}</p><p>رقم الفاتورة: ${Math.floor(Math.random()*10000)}</p></div>
            <table class="receipt-table"><thead><tr><th>الصنف</th><th>كمية</th><th>السعر</th></tr></thead><tbody>${itemsHtml}</tbody></table>
            <div class="receipt-total-box"><div>المجموع: ${data.totalInvoiceAmount.toFixed(2)} د.أ</div>
            ${data.isInsurance ? `<div>تحمل المريض: ${data.amountPaidByPatient.toFixed(2)} د.أ</div><div>ذمة التأمين: ${(data.totalInvoiceAmount - data.amountPaidByPatient).toFixed(2)} د.أ</div>` : ''}
            <div style="font-weight:bold">المطلوب: ${data.amountPaidByPatient.toFixed(2)} د.أ</div></div>
            <div class="receipt-footer"><p>الكاشير: ${data.cashierName}</p><p>شكراً لثقتكم</p></div>`;
        }

        // معالجة الدفع (مع تعديل الفواتير وحذف القديم ورفع الذمة)
        window.processPayment = async function() {
            if(cart.length === 0) return;
            const isIns = document.getElementById('isInsurance').checked;
            const insCompId = document.getElementById('insCompany').value;
            const insNumber = document.getElementById('insNumber').value;
            if(isIns && (!insCompId || !insNumber)) { alert("يرجى إدخال بيانات التأمين كاملة"); return; }
            const btn = document.getElementById('payBtn');
            btn.disabled = true; document.getElementById('btnText').style.display='none'; document.getElementById('payLoader').style.display='block';
            try {
                if(isEditMode && currentIndex !== -1) {
                    const oldSale = recentSales[currentIndex];
                    if(oldSale.isInsurance && oldSale.insuranceDetails?.debtAmount) {
                        await updateDoc(doc(db, "insurance_companies", oldSale.insuranceDetails.companyId), { total_debt: increment(-oldSale.insuranceDetails.debtAmount) });
                    }
                    await deleteDoc(doc(db, "sales", oldSale.id));
                }
                const finalData = window.currentInvoiceData;
                const invoiceObj = {
                    branchId: sessionData.branchId, cashierId: sessionData.uid, cashierName: sessionData.name,
                    paymentMethod, isInsurance: isIns,
                    items: cart.map(i => ({ id:i.id, name:i.name, barcode:i.barcode, price:i.price, qty:i.qty, discountPercent:i.itemDiscountPercent, finalPrice: i.price * i.qty * (1 - (i.itemDiscountPercent/100)) })),
                    subtotal: finalData.subtotalRaw + finalData.totalDiscount,
                    globalDiscountApplied: globalDiscount,
                    totalDiscountAmount: finalData.totalDiscount,
                    totalInvoiceAmount: finalData.invoiceTotal,
                    amountPaidByPatient: finalData.patientPays,
                    insuranceDetails: isIns ? {
                        companyId: insCompId,
                        companyName: document.getElementById('insCompany').options[document.getElementById('insCompany').selectedIndex]?.text || '',
                        memberNumber: insNumber,
                        copayPercent: parseFloat(document.getElementById('insCopay').value),
                        debtAmount: finalData.insDebt
                    } : null,
                    timestamp: serverTimestamp()
                };
                await addDoc(collection(db, "sales"), invoiceObj);
                if(isIns && finalData.insDebt > 0) {
                    await updateDoc(doc(db, "insurance_companies", insCompId), { total_debt: increment(finalData.insDebt) });
                }
                if(document.getElementById('autoPrint').checked) {
                    document.getElementById('receipt-print-area').innerHTML = generateReceiptHTML(invoiceObj);
                    setTimeout(() => window.print(), 200);
                } else { alert("تم حفظ الفاتورة بنجاح"); }
                await loadRecentSales(); resetToNew();
            } catch(err) { alert("خطأ: "+err.message); } finally { btn.disabled=false; document.getElementById('btnText').style.display='block'; document.getElementById('payLoader').style.display='none'; }
        };

        window.logout = () => { sessionStorage.clear(); auth.signOut().then(()=> window.location.href='login.html'); };

        onAuthStateChanged(auth, (user) => { if(user) loadData(); else window.location.href='login.html'; });
    </script>
</body>
</html>
