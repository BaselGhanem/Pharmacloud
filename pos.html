<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نقطة البيع (POS) - PharmaCloud</title>
    <style>
        /* --- المتغيرات والتصميم المحسن --- */
        :root {
            --bg-color: #f4f7f6;
            --surface-color: rgba(255, 255, 255, 0.85);
            --border-color: rgba(0, 0, 0, 0.1);
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --accent-color: #007aff;
            --danger-color: #ff3b30;
            --success-color: #34c759;
            --warning-color: #ff9500;
            --glass-blur: blur(20px);
            --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #1c1c1e;
                --surface-color: rgba(44, 44, 46, 0.85);
                --border-color: rgba(255, 255, 255, 0.1);
                --text-primary: #f5f5f7;
                --text-secondary: #a1a1a6;
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-primary); height: 100vh; display: flex; overflow: hidden; }

        /* --- Sidebar --- */
        .sidebar { width: 80px; background: var(--surface-color); backdrop-filter: var(--glass-blur); border-left: 1px solid var(--border-color); display: flex; flex-direction: column; align-items: center; padding: 20px 0; z-index: 10; justify-content: space-between;}
        .nav-item { width: 50px; height: 50px; border-radius: 14px; margin-bottom: 15px; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.2s; background: transparent; border: none; font-size: 22px; color: var(--text-primary); }
        .nav-item.active { background: var(--accent-color); color: white; }

        /* --- Main Layout --- */
        .pos-container { flex: 1; display: flex; padding: 20px; gap: 20px; }
        
        .cart-section { flex: 2; background: var(--surface-color); backdrop-filter: var(--glass-blur); border: 1px solid var(--border-color); border-radius: 24px; display: flex; flex-direction: column; padding: 20px; box-shadow: var(--shadow); position: relative; }
        .header-info { display: flex; justify-content: space-between; margin-bottom: 15px; align-items: center; }
        
        .search-bar { position: relative; margin-bottom: 15px; z-index: 20; }
        .search-bar input { width: 100%; padding: 18px 20px; border-radius: 16px; border: 1px solid var(--border-color); background: rgba(150,150,150,0.1); color: var(--text-primary); font-size: 16px; outline: none; }
        .search-results { position: absolute; top: 60px; width: 100%; background: var(--surface-color); backdrop-filter: var(--glass-blur); border: 1px solid var(--border-color); border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); max-height: 250px; overflow-y: auto; display: none; }
        .search-item { padding: 12px 20px; border-bottom: 1px solid var(--border-color); cursor: pointer; display: flex; justify-content: space-between; }

        .cart-items { flex: 1; overflow-y: auto; }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: rgba(0,0,0,0.02); border-radius: 12px; margin-bottom: 8px; }
        
        /* --- Summary Section --- */
        .summary-section { flex: 1.2; background: var(--accent-color); border-radius: 24px; padding: 25px; color: white; display: flex; flex-direction: column; justify-content: space-between; box-shadow: 0 20px 40px rgba(0, 122, 255, 0.3); overflow-y: auto; }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 16px; }
        .total-row { font-size: 30px; font-weight: 800; border-top: 1px solid rgba(255,255,255,0.3); padding-top: 15px; margin-top: 10px; }

        /* --- Payment & Insurance Controls --- */
        .control-box { background: rgba(0,0,0,0.15); padding: 15px; border-radius: 16px; margin-bottom: 15px; }
        .control-title { font-size: 14px; font-weight: bold; margin-bottom: 10px; display: block; }
        
        .payment-btns { display: flex; gap: 8px; }
        .btn-choice { flex: 1; padding: 10px; border: none; border-radius: 10px; background: rgba(255,255,255,0.2); color: white; cursor: pointer; font-weight: bold; }
        .btn-choice.active { background: white; color: var(--accent-color); }

        .insurance-toggle { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; cursor: pointer; }
        .ins-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .ins-input { width: 100%; padding: 8px; border-radius: 8px; border: none; font-size: 13px; outline: none; }

        .btn-pay { background: white; color: var(--accent-color); width: 100%; padding: 18px; border-radius: 16px; border: none; font-size: 20px; font-weight: 800; cursor: pointer; margin-top: 10px; }
        .btn-pay:disabled { opacity: 0.6; }
        .loader { width: 20px; height: 20px; border: 3px solid rgba(0,122,255,0.3); border-radius: 50%; border-top-color: var(--accent-color); animation: spin 1s linear infinite; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="nav-group">
            <button class="nav-item active">🛒</button>
            <button class="nav-item">📦</button>
        </div>
        <button class="nav-item" style="color:var(--danger-color)" onclick="logout()">🚪</button>
    </nav>

    <main class="pos-container">
        
        <section class="cart-section">
            <div class="header-info">
                <h2>فاتورة المبيعات</h2>
                <div class="cashier-badge" id="cashierNameDisplay">تحميل...</div>
            </div>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="ابحث أو امسح الباركود (F2)..." autofocus>
                <div id="searchResults" class="search-results"></div>
            </div>
            <div class="cart-items" id="cartItemsContainer"></div>
        </section>

        <section class="summary-section">
            <div>
                <h3 style="margin-bottom: 15px;">إتمام العملية</h3>
                
                <div class="control-box">
                    <span class="control-title">طريقة الدفع:</span>
                    <div class="payment-btns">
                        <button class="btn-choice active" id="pay_cash" onclick="setPaymentMethod('CASH')">نقدي</button>
                        <button class="btn-choice" id="pay_visa" onclick="setPaymentMethod('VISA')">فيزا</button>
                        <button class="btn-choice" id="pay_cliq" onclick="setPaymentMethod('CLIQ')">كليك</button>
                    </div>
                </div>

                <div class="control-box">
                    <label class="insurance-toggle">
                        <input type="checkbox" id="isInsurance" onchange="toggleInsurance()">
                        <span>مؤمن (شركة تأمين)</span>
                    </label>
                    
                    <div id="insuranceSection" style="display: none;">
                        <div class="ins-fields">
                            <input type="text" id="insCompany" class="ins-input" placeholder="اسم شركة التأمين">
                            <input type="text" id="insNumber" class="ins-input" placeholder="رقم بطاقة التأمين">
                        </div>
                        <div style="margin-top: 10px;">
                            <span style="font-size: 12px;">نسبة تحمل المريض (%):</span>
                            <input type="number" id="insCopay" class="ins-input" value="20" oninput="renderCart()" style="width: 60px;">
                        </div>
                    </div>
                </div>

                <div class="summary-row">
                    <span>إجمالي الفاتورة:</span>
                    <span id="subtotalDisplay">0.00 د.أ</span>
                </div>
                
                <div id="insuranceSummary" style="display: none;">
                    <div class="summary-row" style="color: #ffde00;">
                        <span>ذمة شركة التأمين:</span>
                        <span id="insDebtDisplay">0.00 د.أ</span>
                    </div>
                </div>

                <div class="summary-row total-row">
                    <span id="totalLabel">المطلوب كاش:</span>
                    <span id="grandTotal">0.00 د.أ</span>
                </div>
            </div>
            
            <button class="btn-pay" id="payBtn" onclick="processPayment()">
                <span id="btnText">تأكيد ودفع (Enter)</span>
                <div id="payLoader" class="loader"></div>
            </button>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDP6FlbjAeUqut_79qW0T3rPSvfsjPdHfA",
            authDomain: "gen-lang-client-0023266031.firebaseapp.com",
            projectId: "gen-lang-client-0023266031",
            storageBucket: "gen-lang-client-0023266031.firebasestorage.app",
            messagingSenderId: "1052398695491",
            appId: "1:1052398695491:web:1c29151c816929cdc510f6"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app, "ai-studio-2f881b3f-5867-4dfd-b360-c85f26c6ded4");
        const auth = getAuth(app);

        let cart = [];
        let catalog = [];
        let paymentMethod = 'CASH';

        // تحميل الجلسة
        const sessionData = JSON.parse(sessionStorage.getItem('pharmacy_session'));
        document.getElementById('cashierNameDisplay').textContent = `الكاشير: ${sessionData.name}`;

        onAuthStateChanged(auth, (user) => { if (user) loadCatalog(); else window.location.href = 'login.html'; });

        async function loadCatalog() {
            const snap = await getDocs(collection(db, "products"));
            snap.forEach(doc => catalog.push({ id: doc.id, ...doc.data() }));
        }

        // --- وظائف طرق الدفع ---
        window.setPaymentMethod = function(method) {
            paymentMethod = method;
            document.querySelectorAll('.btn-choice').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`pay_${method.toLowerCase()}`).classList.add('active');
        };

        // --- وظائف التأمين ---
        window.toggleInsurance = function() {
            const isIns = document.getElementById('isInsurance').checked;
            document.getElementById('insuranceSection').style.display = isIns ? 'block' : 'none';
            document.getElementById('insuranceSummary').style.display = isIns ? 'block' : 'none';
            document.getElementById('totalLabel').textContent = isIns ? 'يتحمل المريض (كاش):' : 'المطلوب كاش:';
            renderCart();
        };

        // --- البحث والعمليات ---
        const searchInput = document.getElementById('searchInput');
        const searchResults = document.getElementById('searchResults');

        searchInput.addEventListener('input', function() {
            const val = this.value.trim().toLowerCase();
            searchResults.innerHTML = '';
            if (val.length < 1) { searchResults.style.display = 'none'; return; }
            const matches = catalog.filter(p => p.name.toLowerCase().includes(val) || p.barcode.includes(val)).slice(0, 5);
            matches.forEach(p => {
                const div = document.createElement('div');
                div.className = 'search-item';
                div.innerHTML = `<span>${p.name}</span> <b>${p.price} د.أ</b>`;
                div.onclick = () => { addToCart(p); searchInput.value = ''; searchResults.style.display = 'none'; };
                searchResults.appendChild(div);
            });
            searchResults.style.display = 'block';
        });

        function addToCart(p) {
            const exist = cart.find(i => i.barcode === p.barcode);
            if (exist) exist.qty++; else cart.push({ ...p, qty: 1 });
            renderCart();
        }

        window.renderCart = function() {
            const container = document.getElementById('cartItemsContainer');
            container.innerHTML = '';
            let total = 0;
            cart.forEach(item => {
                total += item.price * item.qty;
                container.innerHTML += `
                    <div class="item-row">
                        <div><b>${item.name}</b><br><small>${item.barcode}</small></div>
                        <div>
                            <span>${item.qty} × ${item.price}</span>
                            <button onclick="removeItem('${item.barcode}')" style="margin-right:10px; border:none; background:none; cursor:pointer;">✖</button>
                        </div>
                    </div>`;
            });

            const isIns = document.getElementById('isInsurance').checked;
            const copayPercent = parseFloat(document.getElementById('insCopay').value) || 0;
            
            let patientPays = total;
            let insuranceDebt = 0;

            if (isIns) {
                patientPays = total * (copayPercent / 100);
                insuranceDebt = total - patientPays;
            }

            document.getElementById('subtotalDisplay').textContent = total.toFixed(2) + " د.أ";
            document.getElementById('insDebtDisplay').textContent = insuranceDebt.toFixed(2) + " د.أ";
            document.getElementById('grandTotal').textContent = patientPays.toFixed(2) + " د.أ";

            window.finalCalculation = { total, patientPays, insuranceDebt };
        };

        window.removeItem = (barcode) => { cart = cart.filter(i => i.barcode !== barcode); renderCart(); };

        // --- عملية الدفع وحفظ البيانات ---
        window.processPayment = async function() {
            if (cart.length === 0) return;
            
            const isIns = document.getElementById('isInsurance').checked;
            const insComp = document.getElementById('insCompany').value;
            const insNum = document.getElementById('insNumber').value;

            if (isIns && (!insComp || !insNum)) {
                alert("يرجى إدخال بيانات التأمين كاملة!");
                return;
            }

            const payBtn = document.getElementById('payBtn');
            payBtn.disabled = true;

            try {
                const invoiceData = {
                    branchId: sessionData.branchId,
                    cashierId: sessionData.uid,
                    cashierName: sessionData.name,
                    paymentMethod: paymentMethod,
                    isInsurance: isIns,
                    insuranceDetails: isIns ? {
                        company: insComp,
                        memberNumber: insNum,
                        copayPercent: parseFloat(document.getElementById('insCopay').value),
                        debtAmount: window.finalCalculation.insuranceDebt
                    } : null,
                    items: cart,
                    totalInvoice: window.finalCalculation.total,
                    amountPaidByPatient: window.finalCalculation.patientPays,
                    timestamp: serverTimestamp()
                };

                await addDoc(collection(db, "sales"), invoiceData);
                alert("تمت العملية بنجاح!");
                cart = [];
                document.getElementById('isInsurance').checked = false;
                toggleInsurance();
                renderCart();
            } catch (e) {
                alert("خطأ: " + e.message);
            } finally {
                payBtn.disabled = false;
            }
        };

        window.logout = () => { sessionStorage.clear(); window.location.href = 'login.html'; };
    </script>
</body>
</html>
